<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneAces' Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>OneAces</h2>
        <div class="sidebar-profile" onclick="goProfile()">
            <div class="avatar" id="avatar"></div>
            <span id="userDisplay"></span>
        </div>
        <div>
            <ul class="menu">
                <a href="Index.html"><li>Dashboard</li></a>
                <a href="LessonCatalog.html"><li>Lessons Catalog</li></a>
                <a href="Quizzes.html"><li class="active">Quizzes</li></a>
            </ul>
        </div>
        <div class="sidebar-logout">
            <button onclick="logout()">Logout</button>
        </div>
    </nav>
 
    <main class="main-content">
        <header>
            <h1>Quizzes</h1>
        </header>
 
        <section class="stats">
            <div class="card" id="QZTotalLessons">Total Lessons: 0</div>
            <div class="card" id="QZTotalAvailable">Total Available: 0</div>
        </section>
 
        <table class="book-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Quiz Master</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="QZTbody"></tbody>
        </table>
    </main>
 
    <script src="script.js"></script>
    <script>
        // Call loadProfile immediately after script.js loads
        if (typeof loadProfile === 'function') {
            loadProfile();
        } else {
            // If script.js hasn't loaded yet, wait for it
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof loadProfile === 'function') {
                    loadProfile();
                }
            });
        }
    </script>
</body>
</html>
