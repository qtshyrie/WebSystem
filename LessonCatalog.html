<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneAces' Library</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    
        <nav class="sidebar">
            <h2>OneAces' Library</h2>

    
            <div class="sidebar-profile" onclick="goProfile()">
                <div class="avatar" id="avatar"></div>
                <span id="userDisplay"></span>
            </div>
            <ul class="menu">
                <a href="Index.html"><li>Dashboard</li></a>
                <a href="LessonCatalog.html"><li class="active">Lessons Catalog</li></a>
                <a href="Quizzes.html"><li>Quizzes</li></a>
                <a href="Settings.html"><li>Settings</li></a>
            </ul>

            <div class="sidebar-logout">
            <button onclick="logout()">Logout</button>
            </div>
        </nav>

    <main class="main-content">
        <header>
            <h1>Lessons Catalog</h1>
        </header>

        <section class="stats" id="stats">
            <div class="card" id="totalbooks"> Total Book: None</div>
            <div class="card" id="totalavailable"> Available: None</div>
        </section>

        <table class="book-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="TBody"></tbody>
        </table>
    </main>
    <script src="script.js"></script>
</body>
</html>
