<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Library System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Lumina Lib</h2>
            <ul>
                <a href="Index.html"><li>Dashboard</li></a>
                <a href="LessonCatalog.html"><li class="active">Lessons Catalog</li></a>
                <a href="Quizzes.html"><li>Quizzes</li></a>
                <a href="Settings.html"><li>Settings</li></a>
            </ul>
